# ═══════════════════════════════════════════════════════════════
# Gingx Ecosystem — Harness Configuration
# "Autonomía cruda transformada en trabajo de ingeniería controlado"
# Inspirado en Gentle AI (Alan Buscaglia) + Thoughtworks (Böckeler)
# ═══════════════════════════════════════════════════════════════

gingx_version: "0.2.0"

# ── Core ──────────────────────────────────────────────────────
openspec_enabled: true
mnemo_enabled: true

# ── Agent Behavior ───────────────────────────────────────────
token_report_frequency: 3
swarm_mode: hybrid  # dag | supervisor | swarm | hybrid

# ── Skills ─────────────────────────────────────────────────
skill_catalog_path: skills/
auto_update_skills: false

# ═══════════════════════════════════════════════════════════════
# HARNESSES — 20 core + 10 extended
# Cada harness es un contrato operacional, no una sugerencia
# ═══════════════════════════════════════════════════════════════

harness:
  # ── BLOQUE 1: ORQUESTACIÓN Y CONTEXTO (4) ──────────────────

  orchestrator:
    enabled: true
    persona: supervisor
    rule: "coordina, no ejecuta"
    phases: [explore, propose, spec, design, tasks, apply, verify, archive]
    phase_agent_map:
      explore:  explorer-agent
      propose:  po-agent
      spec:     po-agent
      design:   architect-agent
      tasks:    dev-agent
      apply:    dev-agent
      verify:   qa-agent
      security: devops-agent
      archive:  supervisor

  delegation:
    enabled: true
    strategy:
      inline_if: "cambio local, ≤3 archivos, claro"
      delegate_if: "múltiples áreas, contexto grande, requiere exploración"
      full_sdd_if: "ambiguo, arquitectónico, riesgoso"
    subagent_isolation: true  # cada subagente recibe solo su contexto

  sdd_init:
    enabled: true
    command: "gingx-sdd spec"
    detects: [stack, test_runner, conventions, strictness]
    artifacts: [proposal.md, specs/, design.md, tasks.md]

  execution_mode:
    enabled: true
    modes:
      interactive: "explora, propone, frena para decisión humana"
      automatic:   "avanza fase por fase con menos interrupciones"
      dry_run:     "solo pre-release checks, sin ejecución real"
    current: hybrid  # leído de swarm_mode

  # ── BLOQUE 2: FASES Y ARTIFACTOS (5) ──────────────────────

  phase_dag:
    enabled: true
    order: [init, explore, propose, spec, design, tasks, apply, verify, archive]
    parallel_allowed: [[spec, design]]  # fases que corren en paralelo
    rule: "el orden no se negocia — no se salta fases"

  artifact_dependency:
    enabled: true
    contracts:
      spec_needs: [proposal]
      design_needs: [proposal, spec]
      tasks_needs: [spec, design]
      apply_needs: [tasks, acceptance_criteria]
      verify_needs: [spec, tasks, evidence]

  result_contract:
    enabled: true
    envelope:
      - status          # ok | blocked | needs_human
      - executive_summary
      - artifacts_produced
      - next_recommended
      - risks_open
      - skill_resolution  # qué skills se aplicaron/cayeron

  artifact_grammar:
    enabled: true
    format: openspec  # proposal + specs + design + tasks
    extended:
      - bdd_scenarios    # Gherkin en cada spec
      - trade_off_table  # en design.md
      - acceptance_criteria_checklist

  artifact_store:
    enabled: true
    mode: hybrid  # repo + mnemo
    repo_path: openspec/changes/
    memory: mnemo  # ~/.mnemo/mnemo.db

  # ── BLOQUE 3: CALIDAD Y CONTINUIDAD (3) ────────────────────

  strict_tdd:
    enabled: true
    protocol: [red, green, triangulate, refactor]
    persona: dev-agent
    rule: "sin tests no hay merge"

  verify:
    enabled: true
    persona: qa-agent
    requires: [test_output, coverage_evidence, risk_assessment]
    rule: "terminé ≠ verificado"

  apply_continuity:
    enabled: true
    tracks: [task_status, tests_run, blockers_found]
    storage: mnemo  # progress tracking entre sesiones

  # ── BLOQUE 4: SKILLS Y SUBAGENTES (4) ─────────────────────

  skill_registry:
    enabled: true
    paths:
      project: skills/team/
      user: ~/.claude/skills/
      extras: gingx-sdd/extras/skills/
    auto_refresh_on_start: true
    output: .gingx/skill-registry.md

  skill_digestion:
    enabled: true
    rule: "el subagente recibe reglas compactas, no 100 páginas"
    max_compacted_rules: 8
    output: project_standards (en el prompt del subagente)

  skill_resolution_feedback:
    enabled: true
    tracks: [skills_applied, skills_unavailable, fallbacks_used]
    storage: result_contract.skill_resolution

  subagent_isolation:
    enabled: true
    rule: "cada agente recibe SOLO su contexto — no la conversación completa"
    context_per_agent:
      explore:   [repo_map, prior_art]
      propose:   [explore_output, stakeholder_intent]
      spec:      [proposal, acceptance_criteria_template]
      design:    [proposal, spec, architecture_constraints]
      tasks:     [spec, design, task_template]
      apply:     [tasks, design, digested_skills]
      verify:    [spec, tasks, evidence_package]
      security:  [changed_files, dependency_graph]
      archive:   [all_artifacts, session_summary]

  # ── BLOQUE 5: ENTREGA (3) ─────────────────────────────────

  review_workload:
    enabled: true
    max_lines_per_pr: 400
    max_areas_touched: 3
    strategy_on_oversize: ask_chain

  delivery_strategy:
    enabled: true
    modes:
      - single_pr       # scope chico
      - stacked_prs      # PRs encadenados (recomendado)
      - feature_track    # branch vacía como target
      - ask_on_risk      # avanzar, frenar si detecta riesgo
      - auto_chain       # partir automáticamente
    default: ask_on_risk

  chain_strategy:
    enabled: true
    geometry: stacked_prs  # stacked | feature_branch | direct_main

  # ── BLOQUE 6: EXTENDIDOS (10) ──────────────────────────────

  model_routing:
    enabled: false  # requiere multiple API keys
    rule: "cada fase/agente puede usar distinto modelo"
    default_model: claude-sonnet-4-6
    per_phase: {}   # explícito en .gingx/models.yaml

  profile_isolation:
    enabled: true
    profiles_dir: .gingx/profiles/
    rules:
      - "un perfil por developer"
      - "team profile para convenciones compartidas"
      - "no mezclar preferencias entre proyectos"

  permission_security:
    enabled: true
    block_destructive_without_confirm: true
    blocked_commands: [rm -rf, git push --force, DROP TABLE, DELETE FROM]
    confirm_required: [git push, npm publish, docker push]

  mcp_injection:
    enabled: true
    servers:
      mnemo:
        command: "mnemo mcp"
        tools: [search, save, similar, transfer, release, diff, pack, conflicts, stats]
        active_phases: [all]

  backup:
    enabled: true
    triggers: [before_release, config_mutation, schema_change]
    method: mnemo_release_snapshot

  rollback:
    enabled: true
    strategy: git_revert
    auto_on: [test_failure, security_breach, schema_conflict]

  component_dependency:
    enabled: true
    engine: DAG  # HDU-06 swarm/dag.go
    tracks: [imports, calls, data_flow, shared_state]

  command_wrapper:
    enabled: true
    implementation: claude_code_hooks
    hooks: [PreToolUse, PostToolUse, PostToolBatch, Stop, SessionStart]

  per_agent_adapter:
    enabled: true
    adapts: [claude_code, opencode, codex, cursor, kiro, antigravity]
    format: portable_markdown  # skills/team/*.md

  session_summary:
    enabled: true
    triggers: [stop_hook, compaction, session_end]
    storage: mnemo
    includes: [decisions, patterns, progress, blockers]

  # ── BLOQUE 7: AGENT FACTORY (4) ──────────────────────────────

  agent_registry:
    enabled: true
    auto_refresh_on_start: true
    paths:
      personas: skills/team/
      tech_stacks: extras/skills/
      profiles: .gingx/profiles/
    output: .gingx/skill-registry.md
    description: "Escanea, valida, e indexa agentes y tech stacks"

  agent_dispatch:
    enabled: true
    default_mode: prompt           # prompt | mcp | hook
    default_profile: developer
    proactive_interrogation: true
    max_context_memories: 5
    result_contract_enforcement: true
    dispatch_record: mnemo         # guarda dispatch en mnemo para cross-session tracking
    description: "Dispara sub-agentes con persona + tech stack + mnemo + interrogacion"

  profile_loader:
    enabled: true
    profiles_dir: .gingx/profiles/
    active_profile: developer
    rules:
      - "un perfil por equipo — define tech stack por agente"
      - "profile overrides defaults, no reemplaza personas"
      - "interrogation depth seteado por perfil"
    description: "Carga perfiles YAML de composicion de equipo"

  tech_stack_digestion:
    enabled: true
    rule: "tech skills compactados en reglas digeribles (max 10 por stack)"
    priority: profile_override > agent_metadata > default_stack
    categories: [web, backend, mobile, ai, testing, infra]
    description: "Modulos de conocimiento tecnologico cargables por agente"

  # ── BLOQUE 8: CODE INTELLIGENCE (3) ──────────────────────────

  codegraph:
    enabled: true
    auto_index_on_init: true
    auto_sync: true
    exclude_patterns: [node_modules, dist, build, .git, vendor, __pycache__]
    max_file_size: 1048576
    languages: []

  codegraph_mcp:
    enabled: true
    command: "codegraph serve --mcp"
    tools: [search, context, callers, callees, impact, node, explore, status, files]
    active_phases: [explore, design, apply, verify]
    auto_allow: true

  codegraph_knowledge_bridge:
    enabled: true
    export_on_release: true
    export_symbols: [classes, functions, routes, apis]
    mnemo_type: code-structure
    description: "Exporta code graph a mnemo para cross-project knowledge"
