# Component Index — Auto-generated by explorer-agent
# Every significant component with its role, location, and dependencies.
# Used by architect-agent for impact analysis and dev-agent for context.

components:
  GoalState:
    path: gingx-sdd/gingx_sdd/goal_tracker.py
    type: dataclass
    role: "Full tracked state for one autonomous goal — OKR + progress + history"
    callers: [GoalStore, cli.goal_loop, cli.goal_status]
    callees: [KeyResult]
    tests: []
    domain: sdd-core

  GoalStore:
    path: gingx-sdd/gingx_sdd/goal_tracker.py
    type: class
    role: "Persists goal entries to .gingx/goals/<id>.yaml, syncs to mnemo"
    callers: [cli.goal_create, cli.goal_loop, cli.goal_complete]
    callees: [GoalState, mnemo CLI]
    tests: []
    domain: sdd-core

  classify_task:
    path: gingx-sdd/gingx_sdd/auto_delegate.py
    type: function
    role: "Classifies a task as inline, delegate, or full_sdd based on keywords"
    callers: [dispatch, cli.auto]
    callees: []
    tests: []
    domain: sdd-core

  dispatch:
    path: gingx-sdd/gingx_sdd/auto_delegate.py
    type: function
    role: "Analyze and dispatch a task to the right agent (auto or interactive)"
    callers: [cli.auto]
    callees: [classify_task, suggest_agent, team spawn]
    tests: []
    domain: sdd-core

  init_project:
    path: gingx-sdd/gingx_sdd/init_project.py
    type: function
    role: "Scaffolds a full Gingx SDD project from templates"
    callers: [cli.init]
    callees: [templates/]
    tests: []
    domain: sdd-core

  GingxMode:
    path: gingx-sdd/gingx_sdd/modes.py
    type: enum
    role: "Controls harness strictness: interactive, automatic, dry_run, off"
    callers: [hooks, cli, auto_delegate]
    callees: []
    tests: []
    domain: sdd-core

  session-start.sh:
    path: .claude/hooks/session-start.sh
    type: hook
    role: "Loads project context on session start — HDUs, blockers, codegraph, mnemo"
    callers: [Claude Code SessionStart]
    callees: [mnemo, codegraph, gingx-sdd]
    tests: []
    domain: hooks

  pre-tool-use.sh:
    path: .claude/hooks/pre-tool-use.sh
    type: hook
    role: "SDD gate — blocks Write/Edit without approved spec when harness is active"
    callers: [Claude Code PreToolUse]
    callees: [mode.yaml, current_task.yaml]
    tests: []
    domain: hooks

  stop.sh:
    path: .claude/hooks/stop.sh
    type: hook
    role: "Persists session progress to mnemo + updates HDU tracking on stop"
    callers: [Claude Code Stop]
    callees: [mnemo, codegraph, graphify]
    tests: []
    domain: hooks
