# Nexus Ecosystem — Developer Profile
# "Un perfil por developer — no mezclar preferencias entre proyectos"

name: developer
role: fullstack

# ── Stack ────────────────────────────────────────────────────
stack: [go, python, bash, markdown]
languages: [go, python, bash]
frameworks: [typer, rich, sqlite]
tools: [ollama, mnemo, git, claude-code]

# ── Harness Preferences ──────────────────────────────────────
harness:
  swarm_mode: hybrid                    # dag | supervisor | swarm | hybrid
  delegation: ask_on_risk               # inline | delegate | full_sdd | ask_on_risk
  token_report_frequency: 3             # cada N acciones significativas
  max_lines_per_pr: 400
  chain_strategy: stacked_prs           # stacked | feature_branch | direct_main

# ── SDD Methodology ─────────────────────────────────────────
sdd:
  strictness: full                      # full | relaxed | minimal
  spec_format: openspec                 # proposal + specs + design + tasks
  bdd_required: true                    # Gherkin scenarios en cada spec
  tdd_protocol: [red, green, triangulate, refactor]
  verify_before_archive: true           # QA agent verifica

# ── Patterns ────────────────────────────────────────────────
preferred_patterns:
  - repository-pattern
  - dependency-injection
  - single-responsibility
  - interface-segregation
  - fail-fast
avoided_patterns:
  - god-objects
  - premature-optimization
  - magic-strings
  - hidden-side-effects

# ── Testing ─────────────────────────────────────────────────
testing:
  level: unit+integration               # unit | integration | e2e | unit+integration
  framework: go test | pytest
  coverage_target: 80
  run_before_commit: true

# ── Team Skills (core personas activas) ─────────────────────
team_skills:
  - supervisor                           # orquestador de fases
  - po-agent                             # specs + BDD + criterios aceptación
  - ux-agent                             # usabilidad + accesibilidad
  - architect-agent                      # diseño + trade-offs + dependencias
  - dev-agent                            # implementación test-first
  - qa-agent                             # testing adversarial + mutación
  - devops-agent                         # CI/CD + seguridad + dependencias

# ── Mnemo Memory ────────────────────────────────────────────
mnemo:
  auto_save_on:
    - decision                           # guardar rationale de decisiones
    - bugfix                             # guardar root cause + fix
    - pattern                            # guardar patrones aplicados
    - progress                           # trackear progreso entre sesiones
  search_before:
    - architecture_change
    - new_package
    - api_design
    - db_schema_change

# ── Strengths & Weaknesses ──────────────────────────────────
strengths:
  - go-backend
  - sqlite-vector-search
  - mcp-protocol
  - markdown-portability
weaknesses:
  - frontend-ui
  - mobile-native
  - kubernetes-ops
