# ═══════════════════════════════════════════════════════════════
# Nexus-SDD Skill Suites
# Paquetes de skills por tipo de proyecto
#
# Uso:
#   nexus-sdd init --suite mobile
#   nexus-sdd init --suite "mobile,backend"
#   nexus-sdd init --suite mobile --only "kotlin,swift"
# ═══════════════════════════════════════════════════════════════

suites:

  # ── Mobile ──────────────────────────────────────────────────
  mobile:
    description: Desarrollo mobile completo (Android + iOS + multiplataforma)
    skills:
      - android
      - kotlin-kmp
      - flutter
      - swiftui

  mobile-android:
    description: Solo Android (Kotlin + Compose)
    skills:
      - android
      - kotlin-kmp

  mobile-ios:
    description: Solo iOS (Swift + SwiftUI)
    skills:
      - swiftui

  mobile-flutter:
    description: Multiplataforma con Flutter
    skills:
      - flutter

  # ── Web ─────────────────────────────────────────────────────
  web:
    description: Desarrollo web completo
    skills:
      - react
      - vue
      - nextjs
      - svelte
      - typescript-strict

  web-react:
    description: React + Next.js + TypeScript
    skills:
      - react
      - nextjs
      - typescript-strict

  web-vue:
    description: Vue + TypeScript
    skills:
      - vue
      - typescript-strict

  # ── Backend ─────────────────────────────────────────────────
  backend:
    description: Backend API completo
    skills:
      - fastapi
      - django
      - go-fiber

  backend-python:
    description: Backend Python (FastAPI + Django)
    skills:
      - fastapi
      - django
      - python-best-practices

  backend-go:
    description: Backend Go
    skills:
      - go-fiber
      - go-idiomatic

  # ── Fullstack ───────────────────────────────────────────────
  fullstack:
    description: Web + Backend + Testing
    skills:
      - react
      - nextjs
      - fastapi
      - python-best-practices
      - playwright
      - bdd-behave

  # ── Testing / QA ────────────────────────────────────────────
  testing:
    description: Suite de testing completo
    skills:
      - bdd-behave
      - playwright
      - vitest

  # ── AI / LangGraph ──────────────────────────────────────────
  ai-agent:
    description: Desarrollo de agentes IA con LangGraph + AWS
    skills:
      - langgraph-python
      - langgraph-aws
      - fastapi
      - bdd-behave

  ai-agent-local:
    description: LangGraph local (sin cloud)
    skills:
      - langgraph-python
      - fastapi

  # ── DevOps ─────────────────────────────────────────────────
  devops:
    description: CI/CD + Infraestructura
    skills:
      - docker
      - github-actions
      - terraform
